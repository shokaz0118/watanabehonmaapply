name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Clean install backend deps
        working-directory: ./backend
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install
      - name: Clean install frontend deps
        working-directory: ./frontend
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      - name: Run backend tests (none)
        run: echo "No tests configured"
